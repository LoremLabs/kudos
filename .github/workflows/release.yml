name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          # setup-node creates .npmrc with //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # and sets NODE_AUTH_TOKEN=GITHUB_TOKEN. The publish step overrides
          # NODE_AUTH_TOKEN to empty so npm falls back to OIDC trusted publishing.

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Compute release lane
        id: lane
        shell: bash
        run: |
          pnpm changeset status --output changeset-status.json || true

          node - <<'NODE'
          const fs = require("fs");
          let status;
          try {
            status = JSON.parse(fs.readFileSync("changeset-status.json", "utf8"));
          } catch {
            status = { releases: [] };
          }
          const releasing = new Set((status.releases ?? []).map(r => r.name));

          const POOL_STACK = new Set([
            "@kudos-protocol/pool-server",
            "@kudos-protocol/server",
            "@kudos-protocol/storage-sqlite",
            "@kudos-protocol/storage-postgres",
            "@kudos-protocol/worker-outbox",
            "@kudos-protocol/ports",
            "@kudos-protocol/pool-core",
          ]);

          const PRIMITIVES = new Set([
            "@kudos-protocol/subject-hash",
            "@kudos-protocol/logging",
          ]);

          const poolChanged = [...POOL_STACK].some(p => releasing.has(p));
          const primitivesChanged = [...PRIMITIVES].some(p => releasing.has(p));
          const anythingChanged = releasing.size > 0;

          let lane = "none";
          if (poolChanged) lane = "pool";
          else if (primitivesChanged) lane = "primitives";

          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `lane=${lane}\n`);
          fs.appendFileSync(out, `anythingChanged=${anythingChanged}\n`);
          fs.appendFileSync(out, `poolChanged=${poolChanged}\n`);
          fs.appendFileSync(out, `primitivesChanged=${primitivesChanged}\n`);
          console.log(`lane=${lane} anythingChanged=${anythingChanged}`);
          NODE

      - name: Skip (nothing to release)
        if: steps.lane.outputs.anythingChanged != 'true'
        run: echo "No packages queued for release."

      - name: Build (pool stack lane)
        if: steps.lane.outputs.lane == 'pool'
        run: pnpm -r --filter "./packages/**" run build

      - name: Test (pool stack lane)
        if: steps.lane.outputs.lane == 'pool'
        run: pnpm -r --filter "./packages/**" run test

      - name: Build (primitives lane)
        if: steps.lane.outputs.lane == 'primitives'
        run: pnpm -r --filter @kudos-protocol/subject-hash --filter @kudos-protocol/logging run build

      - name: Test (primitives lane)
        if: steps.lane.outputs.lane == 'primitives'
        run: pnpm -r --filter @kudos-protocol/subject-hash --filter @kudos-protocol/logging run test

      # Version PR only — no publish here
      - name: Changesets (version PR)
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish using npm directly (npm 11 handles OIDC natively)
      - name: Debug npm environment
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          echo "=== npm version ==="
          npm --version
          echo "=== which npm ==="
          which npm
          echo "=== OIDC available ==="
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+(set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+(set)}"
          echo "=== npm config ==="
          npm config list
          echo "=== .npmrc files ==="
          cat /home/runner/work/_temp/.npmrc 2>/dev/null || echo "(no temp .npmrc)"
          cat ~/.npmrc 2>/dev/null || echo "(no user .npmrc)"
          cat .npmrc 2>/dev/null || echo "(no project .npmrc)"
          echo "=== NODE_AUTH_TOKEN ==="
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:+(set)}"

      - name: Publish to npm (trusted publishing)
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        env:
          # Override GITHUB_TOKEN that setup-node injected as NODE_AUTH_TOKEN.
          # Empty string lets npm detect OIDC and use trusted publishing.
          NODE_AUTH_TOKEN: ""
        run: |
          echo "npm $(npm --version)"
          for pkg in packages/*/; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            PKG_PRIVATE=$(node -p "require('./$pkg/package.json').private ?? false")

            if [ "$PKG_PRIVATE" = "true" ]; then
              echo "⏭ Skipping $PKG_NAME (private)"
              continue
            fi

            # Check if this version is already on npm
            PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
              echo "⏭ Skipping $PKG_NAME@$PKG_VERSION (already published)"
              continue
            fi

            echo "📦 Publishing $PKG_NAME@$PKG_VERSION..."
            (cd "$pkg" && npm publish --provenance --access public)
          done
